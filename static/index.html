<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAN 剪贴板</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f172a;
  --bg-card: #1e293b;
  --bg-card-hover: #1e293bcc;
  --bg-input: #1e293b;
  --border: #334155;
  --border-light: #33415580;
  --text: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --danger: #ef4444;
  --success: #22c55e;
  --radius: 0.75rem;
  --radius-sm: 0.5rem;
  --radius-full: 9999px;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 4px 14px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
}

html { font-size: 16px; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

/* ===== Typography ===== */
h1 { font-size: 1.125rem; font-weight: 600; }
h2 { font-size: 1rem; font-weight: 600; }

/* ===== Links ===== */
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ===== Atomic Utilities ===== */
.w-full { width: 100%; }
.max-w-3xl { max-width: 48rem; margin-left: auto; margin-right: auto; }
.flex { display: flex; }
.inline-flex { display: inline-flex; }
.flex-col { flex-direction: column; }
.flex-shrink-0 { flex-shrink: 0; }
.flex-1 { flex: 1; }
.flex-wrap { flex-wrap: wrap; }
.items-center { align-items: center; }
.items-start { align-items: flex-start; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 0.25rem; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.relative { position: relative; }
.absolute { position: absolute; }
.fixed { position: fixed; }
.hidden { display: none; }
.text-center { text-align: center; }
.text-xs { font-size: 0.75rem; }
.text-sm { font-size: 0.875rem; }
.text-base { font-size: 1rem; }
.text-lg { font-size: 1.125rem; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.break-words { overflow-wrap: break-word; }
.whitespace-pre-wrap { white-space: pre-wrap; }
.leading-relaxed { line-height: 1.625; }
.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.rounded { border-radius: var(--radius-sm); }
.rounded-lg { border-radius: var(--radius); }
.rounded-full { border-radius: var(--radius-full); }
.shadow { box-shadow: var(--shadow); }
.shadow-lg { box-shadow: var(--shadow-lg); }
.transition { transition: var(--transition); }
.cursor-pointer { cursor: pointer; }
.resize-none { resize: none; }
.object-contain { object-fit: contain; }
.pointer-events-none { pointer-events: none; }
.overflow-y-auto { overflow-y: auto; }
.select-none { user-select: none; }

/* Spacing */
.p-1 { padding: 0.25rem; }
.p-2 { padding: 0.5rem; }
.p-3 { padding: 0.75rem; }
.p-4 { padding: 1rem; }
.p-5 { padding: 1.25rem; }
.px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
.px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
.px-4 { padding-left: 1rem; padding-right: 1rem; }
.px-5 { padding-left: 1.25rem; padding-right: 1.25rem; }
.py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
.py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
.py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
.py-4 { padding-top: 1rem; padding-bottom: 1rem; }
.py-16 { padding-top: 4rem; padding-bottom: 4rem; }
.pt-2 { padding-top: 0.5rem; }
.pt-3 { padding-top: 0.75rem; }
.mt-1 { margin-top: 0.25rem; }
.mt-2 { margin-top: 0.5rem; }
.mt-3 { margin-top: 0.75rem; }
.mb-1 { margin-bottom: 0.25rem; }
.mb-3 { margin-bottom: 0.75rem; }
.mb-4 { margin-bottom: 1rem; }
.my-2 { margin-top: 0.5rem; margin-bottom: 0.5rem; }
.space-y-3 > * + * { margin-top: 0.75rem; }

/* Opacity */
.opacity-0 { opacity: 0; }
.opacity-100 { opacity: 1; }

/* ===== Header ===== */
.header {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.75rem 1rem;
  max-width: 48rem;
  margin: 0 auto;
}

.header-left { display: flex; align-items: center; gap: 0.75rem; }
.header-left .icon { font-size: 1.5rem; }
.header-left h1 { font-size: 1.125rem; font-weight: 600; white-space: nowrap; }

.header-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.875rem; }

/* ===== Status Dot ===== */
.status-dot {
  width: 0.5rem; height: 0.5rem;
  border-radius: var(--radius-full);
  flex-shrink: 0;
  background: var(--text-muted);
  transition: background var(--transition), box-shadow var(--transition);
}
.status-dot.online { background: var(--success); box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.status-dot.offline { background: var(--danger); box-shadow: 0 0 6px rgba(239,68,68,0.4); }

/* ===== Buttons ===== */
.btn-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.25rem; height: 2.25rem;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
}
.btn-icon:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.btn-icon svg { width: 1.25rem; height: 1.25rem; }

.btn-ghost {
  display: inline-flex;
  align-items: center;
  padding: 0.25rem 0.5rem;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.75rem;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}
.btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 0.875rem;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled {
  background: var(--border);
  color: var(--text-muted);
  cursor: not-allowed;
  transform: none;
}

/* ===== LAN URL Bar ===== */
.lan-bar {
  flex-shrink: 0;
  background: rgba(59, 130, 246, 0.08);
  border-bottom: 1px solid rgba(59, 130, 246, 0.15);
  padding: 0.5rem 1rem;
  font-size: 0.875rem;
}

/* ===== Input Area ===== */
.input-section {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  background: rgba(30, 41, 59, 0.4);
  padding: 0.75rem 1rem;
}

.input-row { display: flex; gap: 0.5rem; align-items: flex-start; }

.textarea {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 0.75rem 1rem;
  font-size: 1rem;
  font-family: inherit;
  color: var(--text);
  resize: none;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
  min-height: 90px;
  max-height: 240px;
}
.textarea::placeholder { color: var(--text-muted); }
.textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
}

.btn-attach {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.5rem; height: 2.5rem;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}
.btn-attach:hover { background: #475569; color: var(--text); }
.btn-attach svg { width: 1.25rem; height: 1.25rem; }

/* ===== Messages ===== */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  scroll-behavior: smooth;
}

/* ===== Card ===== */
.card {
  background: rgba(30, 41, 59, 0.7);
  border: 1px solid rgba(51, 65, 85, 0.5);
  border-radius: var(--radius);
  padding: 0.75rem;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.card:hover { box-shadow: var(--shadow-lg); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.75rem;
  color: var(--text-secondary);
  margin-bottom: 0.25rem;
}

.card-image {
  width: 100%;
  max-height: 18rem;
  border-radius: var(--radius);
  object-fit: contain;
  background: rgba(0,0,0,0.2);
  margin: 0.5rem 0;
  cursor: pointer;
}
.card-image:hover { opacity: 0.9; }

.card-pdf {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin: 0.5rem 0;
  padding: 0.75rem;
  background: rgba(0,0,0,0.2);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
}
.card-pdf:hover { background: rgba(0,0,0,0.4); }

.card-text {
  white-space: pre-wrap;
  overflow-wrap: break-word;
  font-size: 0.875rem;
  line-height: 1.625;
  margin: 0.5rem 0;
}

.card-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.btn-action {
  display: inline-flex;
  align-items: center;
  padding: 0.375rem 0.75rem;
  border-radius: var(--radius-sm);
  border: 1px solid rgba(59, 130, 246, 0.3);
  background: transparent;
  color: var(--accent);
  font-size: 0.75rem;
  font-family: inherit;
  cursor: pointer;
  transition: var(--transition);
}
.btn-action:hover { border-color: var(--accent); background: rgba(59,130,246,0.1); }

.btn-delete {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.5rem; height: 1.5rem;
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  transition: var(--transition);
}
.btn-delete:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

/* ===== Empty State ===== */
.empty-state { text-align: center; padding: 4rem 0; color: var(--text-muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
.empty-state p { font-size: 1.125rem; }
.empty-state .sub { font-size: 0.875rem; margin-top: 0.25rem; }

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  padding: 0.625rem 1.25rem;
  border-radius: var(--radius);
  background: var(--bg-card);
  color: var(--text);
  font-size: 0.875rem;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.35s ease;
}
.toast.show { opacity: 1; }

/* ===== Preview Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-close {
  position: absolute;
  top: 0.75rem; right: 0.75rem;
  width: 2rem; height: 2rem;
  border-radius: var(--radius-full);
  border: none;
  background: rgba(0,0,0,0.4);
  color: rgba(255,255,255,0.7);
  font-size: 1.125rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  z-index: 10;
}
.modal-close:hover { background: rgba(0,0,0,0.6); color: #fff; }
.modal-image { max-width: 90vw; max-height: 90vh; border-radius: var(--radius-sm); object-fit: contain; }

/* ===== QR Popup ===== */
.qr-popup {
  position: absolute;
  right: 0;
  top: 100%;
  margin-top: 0.5rem;
  z-index: 50;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 1.25rem;
  min-width: 230px;
}

/* ===== Animations ===== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.card-enter { animation: fadeIn 0.25s ease-out; }

/* ===== Responsive ===== */
@media (max-width: 640px) {
  html { font-size: 15px; }

  .header-right .status-text,
  .header-right .client-count { display: none; }

  .header-left h1 { font-size: 1rem; }
  .header-left .icon { font-size: 1.25rem; }

  .textarea { font-size: 0.9375rem; min-height: 80px; max-height: 200px; }
  .btn-primary { font-size: 0.8125rem; padding: 0.5rem 0.875rem; }
}

@media (min-width: 768px) {
  .header-inner { padding: 0.875rem 1.25rem; }
  .input-section { padding: 1rem 1.25rem; }
  .messages { padding: 1.25rem; }
  .card { padding: 1rem; }
  .card-text { font-size: 0.9375rem; }
  .textarea { font-size: 1.0625rem; }
}
</style>
<script src="/static/qrcode.min.js" defer></script>

</head>
<body>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <span class="icon">📋</span>
      <h1>局域网剪贴板</h1>
    </div>
    <div class="header-right">
      <!-- QR -->
      <div class="relative">
        <button id="qrBtn" class="btn-icon" title="扫码访问">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3zM15 15v2M15 21v-2M21 15h-3M21 21h-6v-3"/>
          </svg>
        </button>
        <div id="qrPopup" class="qr-popup hidden">
          <div class="text-sm font-semibold text-center mb-3" style="color:var(--text)">📱 扫码快速访问</div>
          <div id="qrCodeContainer" class="flex justify-center mb-3 items-center" style="min-height:160px">
            <div class="text-xs" style="color:var(--text-muted)">加载中...</div>
          </div>
          <div id="qrUrls" class="text-xs text-center space-y-3" style="color:var(--text-secondary)"></div>
          <div class="text-center mt-3 pt-2" style="border-top:1px solid var(--border)">
            <button id="qrCloseBtn" class="btn-ghost">关闭</button>
          </div>
        </div>
      </div>
      <!-- Status -->
      <div class="flex items-center gap-1" id="statusIndicator">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" style="color:var(--text-secondary)" id="statusText">连接中...</span>
      </div>
      <span class="client-count" style="color:var(--text-secondary)" id="clientCount">0 台设备</span>
      <button id="renameBtn" class="btn-ghost">改名</button>
    </div>
  </div>
</header>

<!-- ===== LAN URL Bar ===== -->
<div id="lanUrlBar" class="lan-bar hidden">
  <div class="max-w-3xl flex items-center gap-2">
    <span class="flex-shrink-0" style="color:var(--accent)">📡 局域网访问:</span>
    <div id="lanUrls" class="flex flex-wrap gap-2"></div>
  </div>
</div>

<!-- ===== Input Area ===== -->
<div class="input-section">
  <div class="max-w-3xl">
    <div class="input-row">
      <textarea id="inputText" class="textarea" rows="3"
        placeholder="在此粘贴或输入文本&#10;Ctrl+Enter 发送 · 直接粘贴图片自动分享"></textarea>
      <label class="btn-attach cursor-pointer" title="上传图片或 PDF">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
        </svg>
        <input id="fileInput" type="file" accept="image/*,application/pdf" class="hidden">
      </label>
      <button id="sendBtn" class="btn-primary">发送</button>
    </div>
    <p class="text-xs mt-1" style="color:var(--text-muted)" id="deviceNameLabel"></p>
  </div>
</div>

<!-- ===== Messages ===== -->
<main class="messages" id="messages">
  <div class="max-w-3xl space-y-3" id="messageList">
    <div id="emptyState" class="empty-state">
      <div class="icon">📋</div>
      <p>还没有内容</p>
      <p class="sub">在其他设备上粘贴内容，或在此输入文本 / 粘贴图片</p>
    </div>
  </div>
</main>

<!-- ===== Toast ===== -->
<div id="toast" class="toast"></div>

<!-- ===== Preview Modal ===== -->
<div id="previewModal" class="hidden">
  <div class="modal-overlay" id="previewOverlay">
    <button id="previewCloseBtn" class="modal-close">✕</button>
    <div id="previewContent"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const LS_KEY = 'clipboard_device_name';
  const DEVICE_NAME = localStorage.getItem(LS_KEY) || `设备-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
  localStorage.setItem(LS_KEY, DEVICE_NAME);

  let ws = null;
  let clientId = null;
  let reconnectTimer = null;

  const $ = (s) => document.querySelector(s);
  const statusDot = $('#statusDot');
  const statusText = $('#statusText');
  const clientCountEl = $('#clientCount');
  const deviceNameLabel = $('#deviceNameLabel');
  const inputText = $('#inputText');
  const sendBtn = $('#sendBtn');
  const fileInput = $('#fileInput');
  const messageList = $('#messageList');
  const emptyState = $('#emptyState');
  const toast = $('#toast');
  const renameBtn = $('#renameBtn');

  deviceNameLabel.textContent = `当前设备: ${DEVICE_NAME}`;

  // ---- Toast ----
  let toastTimer = null;
  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ---- iOS detection ----
  function isIOS() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  // ---- Clipboard copy ----
  function copyText(text) {
    // iOS: navigator.clipboard.writeText() resolves silently without
    // writing to the clipboard (especially WKWebView). Use execCommand
    // directly within the synchronous user-gesture handler.
    if (isIOS()) {
      fallbackExecCopy(text);
      return;
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制');
      }).catch(() => {
        fallbackExecCopy(text);
      });
    } else {
      fallbackExecCopy(text);
    }
  }

  function fallbackExecCopy(text) {
    const el = document.createElement('textarea');
    el.value = text;
    el.setAttribute('readonly', '');
    el.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(el);

    // iOS Safari requires contentEditable on the textarea for the Selection
    // API + execCommand('copy') to write to the system clipboard.
    el.contentEditable = 'true';
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    el.setSelectionRange(0, 999999);
    el.contentEditable = 'false';

    try {
      document.execCommand('copy');
      showToast('已复制');
    } catch {
      showToast('复制失败，请手动长按选择复制');
    }

    sel.removeAllRanges();
    document.body.removeChild(el);
  }

  function downloadFile(dataUrl, filename) {
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename || `clipboard-${Date.now()}`;
    a.click();
    showToast('已下载');
  }

  // ---- Preview Modal ----
  const previewModal = document.getElementById('previewModal');
  const previewContent = document.getElementById('previewContent');
  const previewOverlay = document.getElementById('previewOverlay');
  const previewCloseBtn = document.getElementById('previewCloseBtn');

  function openPreview(type, dataUrl) {
    if (type === 'image') {
      previewContent.innerHTML = `<img src="${dataUrl}" class="modal-image" alt="preview">`;
    } else if (type === 'pdf') {
      previewContent.innerHTML = `<embed src="${dataUrl}" type="application/pdf" style="width:90vw;height:90vh;border-radius:0.5rem">`;
    }
    previewModal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closePreview() {
    previewModal.classList.add('hidden');
    previewContent.innerHTML = '';
    document.body.style.overflow = '';
  }

  previewOverlay.addEventListener('click', (e) => {
    if (e.target === previewOverlay) closePreview();
  });
  previewCloseBtn.addEventListener('click', closePreview);

  // ---- Render message card ----
  function addMessageCard(msg) {
    emptyState.style.display = 'none';
    if (document.getElementById(`msg-${msg.id}`)) return;

    const time = new Date(msg.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const isImage = msg.content_type === 'image';
    const isPdf = msg.content_type === 'pdf';
    const div = document.createElement('div');
    div.id = `msg-${msg.id}`;
    div.className = 'card card-enter';

    let contentHtml = '';
    let buttonsHtml = '';

    if (isImage) {
      contentHtml = `<img src="${msg.content}" class="card-image" alt="image">`;
      buttonsHtml = `<button class="btn-action preview-btn">🔍 预览</button><button class="btn-action copy-btn">💾 下载</button>`;
    } else if (isPdf) {
      contentHtml = `<div class="card-pdf preview-btn"><span style="font-size:1.5rem">📄</span><span class="text-sm truncate" style="color:var(--text)">${escapeHtml(msg.filename || '文档.pdf')}</span></div>`;
      buttonsHtml = `<button class="btn-action preview-btn2">🔍 预览</button><button class="btn-action copy-btn">💾 下载</button>`;
    } else {
      contentHtml = `<pre class="card-text">${escapeHtml(msg.content)}</pre>`;
      buttonsHtml = `<button class="btn-action copy-btn">📋 复制</button>`;
    }

    div.innerHTML = `
      <div class="card-header">
        <span>📱 ${escapeHtml(msg.device_name)} · ${time}</span>
        <button class="btn-delete del-btn" title="删除">×</button>
      </div>
      ${contentHtml}
      <div class="card-actions">${buttonsHtml}</div>
    `;

    if (isImage) {
      div.querySelector('img').addEventListener('click', () => openPreview('image', msg.content));
      div.querySelector('.preview-btn').addEventListener('click', () => openPreview('image', msg.content));
    } else if (isPdf) {
      div.querySelector('.preview-btn')?.addEventListener('click', () => openPreview('pdf', msg.content));
      div.querySelector('.preview-btn2')?.addEventListener('click', () => openPreview('pdf', msg.content));
    }

    const copyBtn = div.querySelector('.copy-btn');
    if (isImage) {
      copyBtn.addEventListener('click', () => downloadFile(msg.content, 'clipboard-image.png'));
    } else if (isPdf) {
      copyBtn.addEventListener('click', () => downloadFile(msg.content, msg.filename || '文档.pdf'));
    } else {
      copyBtn.addEventListener('click', () => {
        copyText(msg.content);
        copyBtn.textContent = '✅ 已复制';
        setTimeout(() => { copyBtn.textContent = '📋 复制'; }, 1500);
      });
    }

    div.querySelector('.del-btn').addEventListener('click', () => {
      if (ws) ws.send(JSON.stringify({ type: 'delete_message', payload: { id: msg.id } }));
    });

    messageList.appendChild(div);
    autoScroll();
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ---- Auto-scroll ----
  function autoScroll() {
    const container = document.getElementById('messages');
    const threshold = 80;
    const nearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
    if (nearBottom) {
      requestAnimationFrame(() => { container.scrollTop = container.scrollHeight; });
    }
  }

  // ---- Connection ----
  function updateStatus(connected) {
    if (connected) {
      statusDot.className = 'status-dot online';
      statusText.textContent = '已连接';
      sendBtn.disabled = false;
    } else {
      statusDot.className = 'status-dot offline';
      statusText.textContent = '已断开';
      sendBtn.disabled = true;
    }
  }

  function updateClientCount(n) {
    clientCountEl.textContent = `${n} 台设备`;
  }

  function scheduleReconnect() {
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 2000);
  }

  function connect() {
    if (ws) { try { ws.close(); } catch {} }
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws`);
    ws.onopen = () => {
      updateStatus(true);
      ws.send(JSON.stringify({ type: 'handshake', device_name: DEVICE_NAME }));
    };
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        switch (data.type) {
          case 'welcome':
            clientId = data.payload.client_id;
            messageList.querySelectorAll('[id^="msg-"]').forEach(c => c.remove());
            (data.payload.history || []).forEach(addMessageCard);
            if (!messageList.querySelector('[id^="msg-"]')) emptyState.style.display = 'block';
            break;
          case 'new_message':
            addMessageCard(data.payload);
            break;
          case 'delete_message': {
            const el = document.getElementById(`msg-${data.payload.id}`);
            if (el) el.remove();
            if (!messageList.querySelector('[id^="msg-"]')) emptyState.style.display = 'block';
            break;
          }
          case 'clear_all':
            messageList.querySelectorAll('[id^="msg-"]').forEach(el => el.remove());
            emptyState.style.display = 'block';
            showToast('内容已清空');
            break;
          case 'client_count':
            updateClientCount(data.payload.count);
            break;
        }
      } catch {}
    };
    ws.onclose = () => { updateStatus(false); scheduleReconnect(); };
    ws.onerror = () => {};
  }

  // ---- Send ----
  function sendText(text) {
    const t = text.trim();
    if (!t || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'new_message', payload: { content_type: 'text', content: t } }));
    inputText.value = '';
    inputText.style.height = 'auto';
  }

  function sendFile(file) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    if (file.size > 8 * 1024 * 1024) { showToast('文件超过 8MB 限制'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      const contentType = file.type.startsWith('image/') ? 'image' : 'pdf';
      ws.send(JSON.stringify({
        type: 'new_message',
        payload: { content_type: contentType, content: reader.result, filename: file.name }
      }));
    };
    reader.readAsDataURL(file);
  }

  // ---- Events ----
  sendBtn.addEventListener('click', () => sendText(inputText.value));

  inputText.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      sendText(inputText.value);
    }
  });

  inputText.addEventListener('input', () => {
    inputText.style.height = 'auto';
    inputText.style.height = Math.min(inputText.scrollHeight, 240) + 'px';
  });

  document.addEventListener('paste', (e) => {
    for (const item of e.clipboardData.items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (file) sendFile(file);
        return;
      }
    }
  });

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    sendFile(file);
    fileInput.value = '';
  });

  renameBtn.addEventListener('click', () => {
    const name = prompt('输入设备名称:', DEVICE_NAME);
    if (name && name.trim()) {
      localStorage.setItem(LS_KEY, name.trim());
      location.reload();
    }
  });

  // ---- QR Code Popup ----
  const qrBtn = $('#qrBtn');
  const qrPopup = $('#qrPopup');
  const qrCloseBtn = $('#qrCloseBtn');
  const qrWrap = qrBtn.closest('.relative');
  let qrGenerated = false;
  let qrHideTimer = null;

  function generateQR() {
    if (qrGenerated) return;
    qrGenerated = true;

    const url = window.location.href;
    const container = document.getElementById('qrCodeContainer');

    try {
      if (typeof QRCode !== 'undefined') {
        container.innerHTML = '';
        new QRCode(container, {
          text: url,
          width: 160,
          height: 160,
          colorDark: '#f1f5f9',
          colorLight: '#1e293b',
          correctLevel: QRCode.CorrectLevel.M,
        });
      }
    } catch (e) {
      container.innerHTML = '<div class="text-xs" style="color:var(--text-muted)">QR 生成失败</div>';
    }

    const urlContainer = document.getElementById('qrUrls');
    const urls = [];
    if (window.LAN_IPS && LAN_IPS.length) {
      LAN_IPS.forEach(ip => urls.push(`http://${ip}:${location.port}`));
    }
    urlContainer.innerHTML = urls.length
      ? urls.map(u => `<div style="color:var(--accent)">${u}</div>`).join('')
      : `<div style="color:var(--text-muted)">${window.location.host}</div>`;
  }

  function showQRPopup() {
    clearTimeout(qrHideTimer);
    qrPopup.classList.remove('hidden');
    generateQR();
  }

  function hideQRPopup() {
    qrHideTimer = setTimeout(() => qrPopup.classList.add('hidden'), 200);
  }

  qrBtn.addEventListener('mouseenter', showQRPopup);
  qrBtn.addEventListener('mouseleave', hideQRPopup);
  qrBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (qrPopup.classList.contains('hidden')) showQRPopup();
  });
  qrCloseBtn.addEventListener('click', () => qrPopup.classList.add('hidden'));
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#qrBtn') && !e.target.closest('#qrPopup')) {
      qrPopup.classList.add('hidden');
    }
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      qrPopup.classList.add('hidden');
      if (!previewModal.classList.contains('hidden')) closePreview();
    }
  });

  // ---- Init ----
  updateStatus(false);

  if (window.LAN_IPS && LAN_IPS.length) {
    const bar = $('#lanUrlBar');
    const container = $('#lanUrls');
    LAN_IPS.forEach((ip, i) => {
      const a = document.createElement('a');
      a.href = `http://${ip}:${location.port}`;
      a.target = '_blank';
      a.textContent = `${ip}:${location.port}`;
      a.style.color = 'var(--accent)';
      if (i > 0) {
        const sep = document.createElement('span');
        sep.style.color = 'var(--text-muted)';
        sep.textContent = '|';
        container.appendChild(sep);
      }
      container.appendChild(a);
    });
    bar.classList.remove('hidden');
  }

  connect();
})();
</script>
</body>
</html>
